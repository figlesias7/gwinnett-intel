name: Gwinnett Motivated Seller Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "gwinnett-scraper-pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          CLERK_PORTAL_URL: https://www.gwinnettcourts.com/deeds-and-land-records/
          PROPERTY_APPRAISER_BULK_DATA_URL: ${{ secrets.PROPERTY_APPRAISER_BULK_DATA_URL }}
          LOOKBACK_DAYS: "7"
          HEADLESS: "true"
        run: python scraper/fetch.py

      - name: Ensure Pages artifacts exist
        run: |
          mkdir -p dashboard
          test -f dashboard/records.json || echo '{"fetched_at":"","source":"","date_range":{"from":"","to":"","lookback_days":7},"total":0,"with_address":0,"records":[]}' > dashboard/records.json
          touch dashboard/.nojekyll

      - name: Commit updated lead data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Gwinnett motivated seller leads"
          file_pattern: data/records.json data/ghl_export.csv dashboard/records.json .logs/fetch.log

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
