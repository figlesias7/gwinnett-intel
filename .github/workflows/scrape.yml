name: Scrape

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04

    env:
      PROPERTY_APPRAISER_BULK_DATA_URL: "https://gwinnettcountyga.gov/static/departments/gis-data/downloads/Parcel.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py
