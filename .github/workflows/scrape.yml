name: Gwinnett Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-22.04

    env:
      PROPERTY_APPRAISER_BULK_DATA_URL: "https://gwinnettcountyga.gov/static/departments/gis-data/downloads/Parcel.zip"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Ensure folders exist
        run: |
          mkdir -p data dashboard

      - name: Run scraper
        run: python scraper/fetch.py

      - name: Ensure dashboard index exists
        run: |
          test -f dashboard/index.html || { echo "dashboard/index.html is missing"; exit 1; }

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/records.json dashboard/records.json data/ghl_export.csv
          git diff --staged --quiet || git commit -m "Update scraper data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
